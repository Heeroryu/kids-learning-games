<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Learning Games 🌟</title>
<style>
  :root{ --ink:#2d2a4a; }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  html,body{height:100%; margin:0;}
  body{
    font-family:"Comic Sans MS","Baloo 2",Verdana,system-ui,sans-serif;
    background:linear-gradient(135deg,#ffe0ec 0%,#e7e0ff 45%,#e0f7ff 100%);
    color:var(--ink); user-select:none;
    min-height:100vh; min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(18px,4vh,40px); padding:24px; text-align:center;
  }
  h1{font-size:clamp(40px,9vw,88px); margin:0; color:#a06cd5; text-shadow:3px 3px 0 #fff;}
  .sub{font-size:clamp(18px,4vw,28px); margin:0; opacity:.8;}

  #cards{
    display:flex; flex-wrap:wrap; gap:clamp(16px,3vw,30px);
    align-items:stretch; justify-content:center; width:100%; max-width:1000px;
  }
  .card{
    flex:1 1 240px; max-width:320px; min-width:200px;
    border:none; cursor:pointer; color:#fff;
    border-radius:30px; padding:clamp(22px,4vh,40px) 18px;
    display:flex; flex-direction:column; align-items:center; gap:10px;
    text-decoration:none;
    transition:transform .12s, box-shadow .12s;
  }
  .card:hover, .card:focus{transform:translateY(-6px) scale(1.03); outline:none;}
  .card:active{transform:translateY(2px) scale(1);}
  .card .emoji{font-size:clamp(64px,14vw,120px); line-height:1; filter:drop-shadow(0 6px 8px #0003);}
  .card .title{font-size:clamp(26px,4.5vw,38px); font-weight:bold; text-shadow:2px 2px 0 #0002;}
  .card .desc{font-size:clamp(15px,2.4vw,20px); opacity:.95;}
  .card .key{
    margin-top:6px; font-size:18px; font-weight:bold;
    background:#ffffff40; padding:4px 14px; border-radius:99px;
  }
  .c1{background:#ff6b9d; box-shadow:0 10px 0 #c94b78;}
  .c1:hover{box-shadow:0 14px 0 #c94b78;}
  .c2{background:#4ecdc4; box-shadow:0 10px 0 #2fa89f;}
  .c2:hover{box-shadow:0 14px 0 #2fa89f;}
  .c3{background:#ffa53f; box-shadow:0 10px 0 #d97e23;}
  .c3:hover{box-shadow:0 14px 0 #d97e23;}

  .foot{font-size:14px; opacity:.6;}
</style>
</head>
<body>
  <h1>Learning Games 🌟</h1>
  <p class="sub">Pick a game to play!</p>

  <div id="cards">
    <a class="card c1" href="Spell-It.html">
      <span class="emoji">🔤</span>
      <span class="title">Spell Words</span>
      <span class="desc">Letters &amp; words A–Z</span>
      <span class="key">Press 1</span>
    </a>
    <a class="card c2" href="Math-Fun.html">
      <span class="emoji">🔢</span>
      <span class="title">Numbers</span>
      <span class="desc">Count &amp; add 1–9</span>
      <span class="key">Press 2</span>
    </a>
    <a class="card c3" href="Color-Fun.html">
      <span class="emoji">🎨</span>
      <span class="title">Colors</span>
      <span class="desc">See it &amp; spell it</span>
      <span class="key">Press 3</span>
    </a>
  </div>

  <p class="foot">Tip: open in Microsoft Edge for the friendliest voices ✨</p>

<script>
  const LINKS={'1':'Spell-It.html','2':'Math-Fun.html','3':'Color-Fun.html'};
  document.addEventListener('keydown',e=>{
    if(LINKS[e.key]) window.location.href=LINKS[e.key];
  });
</script>
</body>
</html>
